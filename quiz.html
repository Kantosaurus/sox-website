<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOX Pop Quiz — Test Your Knowledge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.7;
        }
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        .hero h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 8px;
        }
        .hero p {
            color: #a0a0b0;
            font-size: 1.1rem;
        }
        .hero a {
            color: #e94560;
            text-decoration: none;
        }
        .hero a:hover { text-decoration: underline; }
        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #151520;
            border: 1px solid #252530;
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 30px;
        }
        .score-bar .label { color: #888; font-size: 0.9rem; }
        .score-bar .value { color: #fff; font-size: 1.4rem; font-weight: 700; }
        .score-bar .value.perfect { color: #4caf50; }
        .progress-track {
            width: 100%;
            height: 6px;
            background: #252530;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #e94560;
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .question-card {
            background: #151520;
            border: 1px solid #252530;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .question-card.correct { border-color: #4caf50; }
        .question-card.wrong { border-color: #f44336; }
        .question-card .q-number {
            color: #e94560;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .question-card h3 {
            color: #fff;
            font-size: 1.15rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background: #1a1a2e;
            border: 1px solid #303045;
            border-radius: 8px;
            padding: 14px 18px;
            color: #c0c0c0;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-btn:hover:not(.disabled) {
            border-color: #e94560;
            color: #fff;
            background: #1e1e35;
        }
        .option-btn .letter {
            background: #252540;
            color: #888;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .option-btn:hover:not(.disabled) .letter {
            background: #e94560;
            color: #fff;
        }
        .option-btn.selected-correct {
            border-color: #4caf50;
            background: #0a1a0a;
            color: #fff;
        }
        .option-btn.selected-correct .letter {
            background: #4caf50;
            color: #fff;
        }
        .option-btn.selected-wrong {
            border-color: #f44336;
            background: #1a0a0a;
            color: #fff;
        }
        .option-btn.selected-wrong .letter {
            background: #f44336;
            color: #fff;
        }
        .option-btn.reveal-correct {
            border-color: #4caf50;
            background: #0a1a0a;
        }
        .option-btn.reveal-correct .letter {
            background: #4caf50;
            color: #fff;
        }
        .option-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }
        .explanation {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.6;
            display: none;
        }
        .explanation.show { display: block; }
        .explanation.correct-exp {
            background: #0a1a0a;
            border-left: 3px solid #4caf50;
            color: #a0c0a0;
        }
        .explanation.wrong-exp {
            background: #1a0a0a;
            border-left: 3px solid #f44336;
            color: #c0a0a0;
        }
        .results-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid #e94560;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            display: none;
        }
        .results-card.show { display: block; }
        .results-card h2 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 10px;
        }
        .results-card .big-score {
            font-size: 4rem;
            font-weight: 800;
            color: #e94560;
            margin: 16px 0;
        }
        .results-card .big-score.perfect { color: #4caf50; }
        .results-card .message {
            color: #a0a0b0;
            font-size: 1.1rem;
            margin-bottom: 24px;
        }
        .restart-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .restart-btn:hover { background: #d63050; }
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid #222;
        }
        .footer a { color: #e94560; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="hero">
    <h1>🧠 SOX Pop Quiz</h1>
    <p>15 questions. No time limit. How well do you know Sarbanes-Oxley?</p>
    <p style="margin-top: 10px;"><a href="index.html">← Back to SOX Guide</a></p>
</div>

<div class="container">
    <div class="score-bar">
        <div>
            <div class="label">Score</div>
            <div class="value" id="score">0 / 0</div>
        </div>
        <div>
            <div class="label">Question</div>
            <div class="value" id="qcount">1 / 15</div>
        </div>
        <div>
            <div class="label">Accuracy</div>
            <div class="value" id="accuracy">—</div>
        </div>
    </div>
    <div class="progress-track">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>
    <div id="quiz-area"></div>
    <div class="results-card" id="results">
        <h2>Quiz Complete!</h2>
        <div class="big-score" id="final-score"></div>
        <div class="message" id="final-message"></div>
        <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
    </div>
</div>

<div class="footer">
    <p>Built by Artemis 🏹 — March 2026 | <a href="index.html">Back to SOX Guide</a></p>
</div>

<script>
const questions = [
    {
        q: "What year was the Sarbanes-Oxley Act signed into law?",
        options: ["1999", "2001", "2002", "2004"],
        answer: 2,
        explanation: "SOX was signed into law on July 30, 2002 by President George W. Bush, in response to the Enron and WorldCom scandals."
    },
    {
        q: "Which two corporate scandals were the primary catalysts for SOX?",
        options: ["Lehman Brothers & Bear Stearns", "Enron & WorldCom", "Tyco & Adelphia", "AIG & Countrywide"],
        answer: 1,
        explanation: "Enron's collapse in October 2001 and WorldCom's fraud revealed in June 2002 were the primary drivers. Tyco and Adelphia also contributed but Enron and WorldCom were the main catalysts."
    },
    {
        q: "Which SOX section requires CEOs and CFOs to personally certify financial statements?",
        options: ["Section 201", "Section 302", "Section 404", "Section 802"],
        answer: 1,
        explanation: "Section 302 requires senior officers to personally certify the accuracy and completeness of corporate financial reports."
    },
    {
        q: "What does Section 404 of SOX require?",
        options: ["Whistleblower protections", "Real-time financial disclosure", "Internal controls assessment and external audit attestation", "Criminal penalties for document destruction"],
        answer: 2,
        explanation: "Section 404 requires management to assess and report on internal controls over financial reporting (ICFR), and external auditors must attest to that assessment. It's the most expensive SOX requirement."
    },
    {
        q: "What oversight body was created by SOX?",
        options: ["SEC", "FASB", "PCAOB", "FINRA"],
        answer: 2,
        explanation: "The Public Company Accounting Oversight Board (PCAOB) was created by SOX to oversee the audits of public companies and register/inspect audit firms. The SEC existed since 1934."
    },
    {
        q: "What is the maximum prison sentence for willfully certifying false financial reports under Section 906?",
        options: ["5 years", "10 years", "15 years", "20 years"],
        answer: 3,
        explanation: "Section 906 imposes criminal penalties of up to $5 million in fines and 20 years imprisonment for willfully certifying false financial statements."
    },
    {
        q: "Which audit firm collapsed due to the Enron scandal?",
        options: ["Deloitte", "PricewaterhouseCoopers", "Arthur Andersen", "KPMG"],
        answer: 2,
        explanation: "Arthur Andersen, one of the 'Big Five' accounting firms, was convicted of obstruction of justice for shredding Enron documents. The firm surrendered its CPA license and collapsed, turning the Big Five into the Big Four."
    },
    {
        q: "Section 802 of SOX deals with:",
        options: ["Executive compensation", "Destroying or altering financial records", "Audit committee independence", "Quarterly reporting requirements"],
        answer: 1,
        explanation: "Section 802 imposes criminal penalties (up to 20 years) for knowingly altering, destroying, mutilating, or concealing records or documents with intent to impede a federal investigation."
    },
    {
        q: "What protection does Section 806 provide?",
        options: ["Protection for audit firms", "Whistleblower protection for employees", "Protection against hostile takeovers", "Executive immunity during investigations"],
        answer: 1,
        explanation: "Section 806 protects employees of publicly traded companies who report fraud from retaliation such as discharge, demotion, suspension, threats, or harassment."
    },
    {
        q: "Approximately how much does SOX Section 404 compliance cost large companies annually?",
        options: ["$50,000 – $100,000", "$250,000 – $500,000", "$1.3 – $2 million", "$10 – $20 million"],
        answer: 2,
        explanation: "SOX 404 compliance costs average $1.3–$2 million annually for large companies. For smaller public companies, it can consume 1–2% of revenue."
    },
    {
        q: "SOX prohibits audit firms from providing which of the following to their audit clients?",
        options: ["Tax advisory services", "Bookkeeping and financial systems design", "Legal counsel", "All consulting services"],
        answer: 1,
        explanation: "Section 201 prohibits auditors from providing certain non-audit services to audit clients, including bookkeeping, financial information systems design, and management functions, to prevent conflicts of interest."
    },
    {
        q: "Who were the two legislators SOX is named after?",
        options: ["Sarbanes & Oxley", "Dodd & Frank", "Glass & Steagall", "Gramm & Leach"],
        answer: 0,
        explanation: "Senator Paul Sarbanes (D-MD) and Representative Michael Oxley (R-OH) sponsored the bill. Dodd-Frank is the 2010 post-financial-crisis law; Glass-Steagall was the 1933 banking separation act."
    },
    {
        q: "What does Section 409 require companies to do?",
        options: ["Rotate auditors every 5 years", "Disclose material changes on a rapid and current basis", "Submit annual internal control reports", "File criminal complaints for fraud"],
        answer: 1,
        explanation: "Section 409 requires real-time disclosure — companies must inform the public 'on a rapid and current basis' about material changes to their financial condition or operations."
    },
    {
        q: "Which of these is NOT a title within the Sarbanes-Oxley Act?",
        options: ["Corporate Responsibility", "Auditor Independence", "Consumer Protection", "Enhanced Financial Disclosures"],
        answer: 2,
        explanation: "Consumer Protection is part of Dodd-Frank (2010), not SOX. SOX titles include Public Company Accounting Oversight Board, Auditor Independence, Corporate Responsibility, and Enhanced Financial Disclosures."
    },
    {
        q: "SOX primarily applies to which types of companies?",
        options: ["All US businesses", "Only Fortune 500 companies", "All publicly traded companies in the US", "Only financial institutions"],
        answer: 2,
        explanation: "SOX applies to all publicly traded companies in the United States, as well as their wholly-owned subsidiaries and foreign companies that are publicly traded and do business in the US."
    }
];

let currentQ = 0;
let correct = 0;
let answered = 0;

function renderQuiz() {
    const area = document.getElementById('quiz-area');
    area.innerHTML = '';
    questions.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'question-card' + (i === 0 ? '' : ' hidden');
        card.id = 'q' + i;
        const letters = ['A', 'B', 'C', 'D'];
        card.innerHTML = `
            <div class="q-number">Question ${i + 1} of ${questions.length}</div>
            <h3>${q.q}</h3>
            <div class="options">
                ${q.options.map((opt, j) => `
                    <button class="option-btn" onclick="selectAnswer(${i}, ${j})" id="q${i}o${j}">
                        <span class="letter">${letters[j]}</span>
                        <span>${opt}</span>
                    </button>
                `).join('')}
            </div>
            <div class="explanation" id="exp${i}"></div>
        `;
        area.appendChild(card);
    });
}

function selectAnswer(qi, oi) {
    const q = questions[qi];
    const btns = document.querySelectorAll(`#q${qi} .option-btn`);
    btns.forEach(b => b.classList.add('disabled'));

    answered++;
    const exp = document.getElementById('exp' + qi);
    
    if (oi === q.answer) {
        correct++;
        document.getElementById('q' + qi + 'o' + oi).classList.add('selected-correct');
        document.getElementById('q' + qi).classList.add('correct');
        exp.className = 'explanation show correct-exp';
        exp.innerHTML = '✅ <strong>Correct!</strong> ' + q.explanation;
    } else {
        document.getElementById('q' + qi + 'o' + oi).classList.add('selected-wrong');
        document.getElementById('q' + qi + 'o' + q.answer).classList.add('reveal-correct');
        document.getElementById('q' + qi).classList.add('wrong');
        exp.className = 'explanation show wrong-exp';
        exp.innerHTML = '❌ <strong>Wrong.</strong> ' + q.explanation;
    }

    document.getElementById('score').textContent = correct + ' / ' + answered;
    const pct = Math.round((correct / answered) * 100);
    document.getElementById('accuracy').textContent = pct + '%';
    if (pct === 100 && answered > 2) document.getElementById('accuracy').classList.add('perfect');

    // Show next question after a delay
    setTimeout(() => {
        if (qi + 1 < questions.length) {
            document.getElementById('q' + (qi + 1)).classList.remove('hidden');
            document.getElementById('q' + (qi + 1)).scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        if (answered === questions.length) showResults();
    }, 800);

    document.getElementById('qcount').textContent = Math.min(answered + 1, questions.length) + ' / ' + questions.length;
    document.getElementById('progress').style.width = (answered / questions.length * 100) + '%';
}

function showResults() {
    const pct = Math.round((correct / questions.length) * 100);
    const results = document.getElementById('results');
    results.classList.add('show');
    
    const scoreEl = document.getElementById('final-score');
    scoreEl.textContent = correct + ' / ' + questions.length + ' (' + pct + '%)';
    if (pct === 100) scoreEl.classList.add('perfect');

    let msg = '';
    if (pct === 100) msg = "Perfect score! You're a SOX compliance officer in the making. 🏆";
    else if (pct >= 80) msg = "Impressive! You know your SOX really well. 💪";
    else if (pct >= 60) msg = "Not bad — you've got the basics down. A few more reads and you'll ace it.";
    else if (pct >= 40) msg = "Room for improvement. Check out the SOX guide and try again!";
    else msg = "Might want to re-read the SOX guide... Enron's accountants probably scored higher. 😬";
    
    document.getElementById('final-message').textContent = msg;
    results.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartQuiz() {
    currentQ = 0;
    correct = 0;
    answered = 0;
    document.getElementById('score').textContent = '0 / 0';
    document.getElementById('qcount').textContent = '1 / ' + questions.length;
    document.getElementById('accuracy').textContent = '—';
    document.getElementById('accuracy').classList.remove('perfect');
    document.getElementById('progress').style.width = '0%';
    document.getElementById('results').classList.remove('show');
    document.getElementById('final-score').classList.remove('perfect');
    renderQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuiz();
</script>

</body>
</html>
